services:

  users-db:
    image: postgres:15
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  users-api:
    build: ./users-service
    environment:
      DB_HOST: users-db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: usersdb
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - users-api
    networks:
      - ecommerce-network

volumes:
  users-db-data:

networks:
  ecommerce-network: