services:
  users-db:
    image: postgres:15
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./users-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usersdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - ecommerce-network

  users-api:
    build: ./users-service
    environment:
      DB_HOST: users-db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: usersdb
    depends_on:
      users-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-network

  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - users-api
    restart: unless-stopped
    networks:
      - ecommerce-network

volumes:
  users-db-data:

networks:
  ecommerce-network: