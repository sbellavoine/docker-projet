services:
  users-db:
    image: postgres:15
    container_name: users-db
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./users-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usersdb"]
      interval: 5s
      retries: 5
    restart: unless-stopped
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - ecommerce-network

  users-api:
    build: ./users-service
    container_name: users-api
    environment:
      PORT: 5001
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: usersdb
    depends_on:
      users-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3

  products-db:
    image: postgres:16-alpine
    container_name: products-db
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - products-db-data:/var/lib/postgresql/data
      - ./products-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d productsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network
    restart: unless-stopped

  products-service:
    build: ./products-service
    container_name: products-service
    environment:
      PORT: 5002
      DB_HOST: products-db
      DB_PORT: 5432
      DB_NAME: productsdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      products-db:
        condition: service_healthy
    expose:
      - "5002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - ecommerce-network
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      users-api:
        condition: service_healthy
      products-service:
        condition: service_healthy
      - users-api
    restart: unless-stopped
    networks:
      - ecommerce-network
    restart: unless-stopped

volumes:
  users-db-data:
  products-db-data:

networks:
  ecommerce-network: